<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="食物紅綠燈">
<meta name="theme-color" content="#16a34a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>食物紅綠燈</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --green: #16a34a; --yellow: #eab308; --red: #dc2626;
    --bg: #f6f7f9; --card: #fff; --ink: #1f2937; --sub: #6b7280; --line: #e5e7eb;
  }
  body {
    margin: 0; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    padding: 16px; max-width: 520px; margin: 0 auto; padding-bottom: 48px;
  }
  h1 { font-size: 20px; margin: 4px 0 16px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .card {
    background: var(--card); border-radius: 16px; padding: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 16px; border: 1px solid var(--line);
  }
  .total-card { text-align: center; }
  .total-num { font-size: 40px; font-weight: 700; line-height: 1.1; }
  .total-label { color: var(--sub); font-size: 13px; margin-top: 4px; }
  .goal-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 10px; font-size: 13px; color: var(--sub); }
  .goal-row input { width: 70px; padding: 4px 6px; border: 1px solid var(--line); border-radius: 8px; text-align: center; font-size: 13px; }
  .bar { height: 8px; background: var(--line); border-radius: 99px; overflow: hidden; margin-top: 12px; }
  .bar > div { height: 100%; background: var(--green); transition: width .4s, background .4s; }
  .back-today { margin-top: 10px; font-size: 13px; color: var(--green); background: none; border: none; cursor: pointer; text-decoration: underline; display: none; }
  .btn {
    display: block; width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: var(--green); color: #fff; font-size: 17px; font-weight: 600;
    cursor: pointer; text-align: center;
  }
  .btn:active { opacity: .85; }
  .btn.sec { background: #fff; color: var(--ink); border: 1px solid var(--line); font-weight: 500; }
  input[type=file] { display: none; }
  .light-banner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; font-weight: 700; color: #fff; margin-bottom: 12px; }
  .light-green { background: var(--green); } .light-yellow { background: var(--yellow); } .light-red { background: var(--red); }
  .name-input { font-size: 18px; font-weight: 700; width: 100%; border: none; border-bottom: 1px dashed var(--line); padding: 2px 0; margin-bottom: 8px; background: transparent; color: var(--ink); }
  .portion-row { display: flex; gap: 8px; margin: 10px 0; }
  .portion-row button { flex: 1; padding: 8px; border: 1px solid var(--line); background: #fff; border-radius: 10px; font-size: 14px; cursor: pointer; color: var(--sub); }
  .portion-row button.on { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }
  .kcal-edit { display: flex; align-items: baseline; gap: 6px; }
  .kcal-edit input { font-size: 32px; font-weight: 700; width: 120px; border: none; border-bottom: 2px solid var(--line); padding: 2px 0; color: var(--ink); background: transparent; }
  .kcal-unit { font-size: 14px; color: var(--sub); }
  .macros { display: flex; gap: 8px; margin: 12px 0; }
  .macro { flex: 1; background: var(--bg); border-radius: 10px; padding: 8px; text-align: center; }
  .macro b { display: block; font-size: 16px; } .macro span { font-size: 11px; color: var(--sub); }
  .reason { font-size: 13px; color: var(--sub); line-height: 1.5; background: var(--bg); padding: 10px 12px; border-radius: 10px; }
  .log-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .log-item:last-child { border-bottom: none; }
  .log-item img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
  .log-item .name { flex: 1; font-size: 14px; }
  .log-item .name small { display: block; color: var(--sub); font-size: 12px; }
  .log-item .kc { font-weight: 600; font-size: 14px; cursor: pointer; border-bottom: 1px dashed var(--line); }
  .log-item .del { color: var(--red); background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .muted { color: var(--sub); font-size: 13px; text-align: center; padding: 12px 0; }
  .spin { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: r .8s linear infinite; vertical-align: -3px; }
  @keyframes r { to { transform: rotate(360deg); } }
  .keyrow { display: flex; gap: 8px; }
  .keyrow input { flex: 1; padding: 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; }
  details summary { cursor: pointer; color: var(--sub); font-size: 13px; }
  .err { color: var(--red); font-size: 13px; margin-top: 8px; }
  .section-title { font-size: 14px; font-weight: 600; margin: 0 0 12px; }
  /* 趨勢圖 */
  .chart { display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; height: 120px; position: relative; }
  .chart .col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; cursor: pointer; }
  .chart .barwrap { width: 100%; flex: 1; display: flex; align-items: flex-end; }
  .chart .barfill { width: 70%; margin: 0 auto; border-radius: 6px 6px 0 0; min-height: 3px; background: var(--green); transition: height .3s; }
  .chart .col.sel .barfill { outline: 2px solid var(--ink); outline-offset: 1px; }
  .chart .vlabel { font-size: 10px; color: var(--sub); margin-bottom: 2px; }
  .chart .dlabel { font-size: 11px; color: var(--sub); margin-top: 4px; }
  .chart .col.sel .dlabel { color: var(--ink); font-weight: 700; }
  .goalline { position: absolute; left: 0; right: 0; border-top: 1px dashed var(--red); font-size: 9px; color: var(--red); }
</style>
</head>
<body>

<h1><span class="dot" style="background:var(--green)"></span><span class="dot" style="background:var(--yellow)"></span><span class="dot" style="background:var(--red)"></span> 食物紅綠燈</h1>

<!-- 當天總熱量 -->
<div class="card total-card">
  <div class="total-num" id="totalKcal">0</div>
  <div class="total-label" id="todayLabel">今天攝取熱量 (kcal)</div>
  <div class="bar"><div id="goalBar" style="width:0%"></div></div>
  <div class="goal-row">
    每日目標 <input type="number" id="goalInput" value="1500"> kcal
  </div>
  <button class="back-today" id="backToday" onclick="goToday()">↩ 回到今天</button>
</div>

<!-- 拍照/上傳 -->
<div class="card">
  <label class="btn" for="cameraInput">📷 拍照</label>
  <input type="file" id="cameraInput" accept="image/*" capture="environment">
  <label class="btn sec" for="fileInput" style="margin-top:10px">🖼️ 從相簿上傳</label>
  <input type="file" id="fileInput" accept="image/*">
  <div id="status"></div>
  <div id="result"></div>
</div>

<!-- 近 7 天趨勢 -->
<div class="card">
  <p class="section-title">📊 近 7 天</p>
  <div class="chart" id="chart"></div>
</div>

<!-- 記錄 -->
<div class="card">
  <p class="section-title" id="logTitle">今日記錄</p>
  <div id="log"><p class="muted">還沒有記錄，拍一張開始吧！</p></div>
</div>

<!-- 設定 -->
<div class="card">
  <details>
    <summary>⚙️ 設定 OpenAI API 金鑰</summary>
    <p class="muted" style="text-align:left">金鑰只存在這支手機/瀏覽器，不會上傳到任何地方。<br>去 platform.openai.com → API keys 申請。</p>
    <div class="keyrow">
      <input type="password" id="apiKey" placeholder="sk-...">
      <button class="btn sec" style="width:auto;padding:12px 16px" onclick="saveKey()">儲存</button>
    </div>
    <div id="keyMsg" class="muted" style="text-align:left"></div>
  </details>
</div>

<script>
const MODEL = "gpt-4o-mini";
const $ = id => document.getElementById(id);
const PORTIONS = { small: {label:"小份", f:0.7}, medium: {label:"中份", f:1.0}, large: {label:"大份", f:1.4} };

// ---- 日期/狀態 ----
let viewDate = new Date();            // 目前檢視的日期
let current = null;                   // 目前辨識結果（尚未存檔）

function keyFor(d) { return "fl-" + d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate(); }
function sameDay(a, b) { return keyFor(a) === keyFor(b); }
function isToday(d) { return sameDay(d, new Date()); }
function loadDay(d) { try { return JSON.parse(localStorage.getItem(keyFor(d)) || "[]"); } catch { return []; } }
function saveDay(d, arr) { localStorage.setItem(keyFor(d), JSON.stringify(arr)); }
function dayTotal(d) { return loadDay(d).reduce((s,x)=>s+(x.kcal||0), 0); }
function goal() { return parseInt($("goalInput").value) || 1500; }

// ---- 設定 ----
function saveKey() {
  const k = $("apiKey").value.trim();
  if (k) { localStorage.setItem("fl-key", k); $("keyMsg").textContent = "✅ 已儲存"; }
  else { localStorage.removeItem("fl-key"); $("keyMsg").textContent = "已清除"; }
}
function getKey() { return localStorage.getItem("fl-key") || ""; }

// ---- 目標 ----
$("goalInput").value = localStorage.getItem("fl-goal") || 1500;
$("goalInput").addEventListener("input", () => {
  localStorage.setItem("fl-goal", $("goalInput").value || 1500);
  renderAll();
});

function goToday() { viewDate = new Date(); renderAll(); }

// ---- 渲染：總熱量 + 記錄 + 圖表 ----
function renderAll() { renderTotal(); renderLog(); renderChart(); }

function renderTotal() {
  const total = dayTotal(viewDate);
  $("totalKcal").textContent = total;
  $("todayLabel").textContent = (isToday(viewDate) ? "今天" : dateLabel(viewDate)) + "攝取熱量 (kcal)";
  $("backToday").style.display = isToday(viewDate) ? "none" : "inline";
  const pct = Math.min(100, Math.round(total / goal() * 100));
  const bar = $("goalBar");
  bar.style.width = pct + "%";
  bar.style.background = total > goal() ? "var(--red)" : (total > goal()*0.8 ? "var(--yellow)" : "var(--green)");
}

function renderLog() {
  $("logTitle").textContent = (isToday(viewDate) ? "今日" : dateLabel(viewDate)) + "記錄";
  const log = loadDay(viewDate);
  const box = $("log");
  if (!log.length) { box.innerHTML = '<p class="muted">這天還沒有記錄。</p>'; return; }
  box.innerHTML = "";
  log.forEach((x, i) => {
    const row = document.createElement("div");
    row.className = "log-item";
    row.innerHTML =
      (x.thumb ? `<img src="${x.thumb}">` : "") +
      `<div class="name">${x.name} <span class="dot" style="background:var(--${x.color})"></span><small>${x.portion||""}</small></div>` +
      `<div class="kc">${x.kcal} kcal</div>`;
    // 點熱量可手動修改
    row.querySelector(".kc").onclick = () => {
      const v = prompt("修改熱量 (kcal)：", x.kcal);
      if (v !== null && !isNaN(parseInt(v))) {
        const l = loadDay(viewDate); l[i].kcal = parseInt(v); saveDay(viewDate, l); renderAll();
      }
    };
    const del = document.createElement("button");
    del.className = "del"; del.textContent = "✕";
    del.onclick = () => { const l = loadDay(viewDate); l.splice(i,1); saveDay(viewDate, l); renderAll(); };
    row.appendChild(del);
    box.appendChild(row);
  });
}

function dateLabel(d) { return (d.getMonth()+1) + "/" + d.getDate(); }
function weekday(d) { return ["日","一","二","三","四","五","六"][d.getDay()]; }

function renderChart() {
  const days = [];
  for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate()-i); days.push(d); }
  const totals = days.map(dayTotal);
  const max = Math.max(goal(), ...totals, 1);
  const box = $("chart");
  box.innerHTML = "";
  days.forEach(d => {
    const t = dayTotal(d);
    const col = document.createElement("div");
    col.className = "col" + (sameDay(d, viewDate) ? " sel" : "");
    const h = Math.round(t / max * 100);
    const color = t > goal() ? "var(--red)" : (t > goal()*0.8 ? "var(--yellow)" : "var(--green)");
    col.innerHTML =
      `<div class="vlabel">${t || ""}</div>` +
      `<div class="barwrap"><div class="barfill" style="height:${h}%;background:${color}"></div></div>` +
      `<div class="dlabel">${weekday(d)}<br>${dateLabel(d)}</div>`;
    col.onclick = () => { viewDate = d; renderAll(); };
    box.appendChild(col);
  });
  // 目標虛線
  const line = document.createElement("div");
  line.className = "goalline";
  const goalH = Math.round(goal() / max * 100);
  // 圖表上半部約 100px 高（120 減去標籤），用百分比定位
  line.style.bottom = (26 + goalH * 0.78) + "px";
  line.textContent = "目標 " + goal();
  box.appendChild(line);
}

// ---- 縮圖 ----
function makeThumb(dataUrl, size) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      const scale = size / Math.max(img.width, img.height);
      c.width = img.width*scale; c.height = img.height*scale;
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL("image/jpeg", 0.6));
    };
    img.src = dataUrl;
  });
}

// ---- 主流程：選照片 ----
$("cameraInput").addEventListener("change", handlePhoto);
$("fileInput").addEventListener("change", handlePhoto);
async function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  $("result").innerHTML = "";
  const key = getKey();
  if (!key) { $("status").innerHTML = '<p class="err">請先到下方「設定」填入 OpenAI API 金鑰。</p>'; return; }

  const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(file); });
  const sendUrl = await makeThumb(dataUrl, 768);
  $("status").innerHTML = '<p class="muted"><span class="spin"></span> AI 辨識中…</p>';
  try {
    const data = await recognize(sendUrl, key);
    $("status").innerHTML = "";
    setupResult(data, await makeThumb(dataUrl, 120));
  } catch (err) {
    $("status").innerHTML = '<p class="err">辨識失敗：' + err.message + '</p>';
  }
  e.target.value = "";
}

// ---- 呼叫 OpenAI ----
async function recognize(imageUrl, key) {
  const prompt =
`你是營養師。看這張食物照片，估算「中份(一般份量)」的營養，並以減重角度給紅綠黃燈。
只回 JSON，不要任何其他文字，格式：
{"name":"食物名稱(繁體中文)","portion":"份量描述","kcal":整數熱量,"protein":蛋白質克數,"fat":脂肪克數,"carb":碳水克數,"color":"green或yellow或red","reason":"一句話說明燈號原因(繁體中文,20字內)"}

燈號標準(減重導向)：
- green綠：低熱量密度、高纖或高蛋白(蔬菜、水煮蛋、無糖優格、瘦肉、清湯)
- yellow黃：中等(白飯、麵、水果、堅果適量)
- red紅：高熱量密度/高糖高油(炸物、甜點、含糖飲料、加工肉、奶油類)
若照片不是食物，name填"非食物"，kcal填0。`;

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
    body: JSON.stringify({
      model: MODEL, max_tokens: 400,
      response_format: { type: "json_object" },
      messages: [{ role: "user", content: [
        { type: "text", text: prompt },
        { type: "image_url", image_url: { url: imageUrl, detail: "low" } }
      ]}]
    })
  });
  if (!res.ok) {
    const t = await res.text();
    if (res.status === 401) throw new Error("金鑰無效，請檢查設定。");
    if (res.status === 429) throw new Error("額度不足或太頻繁，請到 OpenAI 帳戶儲值。");
    throw new Error("HTTP " + res.status + " " + t.slice(0,120));
  }
  const j = await res.json();
  return JSON.parse(j.choices[0].message.content);
}

// ---- 顯示結果（含份量切換 + 手動修改）----
function setupResult(d, thumb) {
  const c = ["green","yellow","red"].includes(d.color) ? d.color : "yellow";
  current = {
    name: d.name || "食物",
    color: c, reason: d.reason || "", thumb,
    base: { kcal: d.kcal||0, protein: d.protein||0, fat: d.fat||0, carb: d.carb||0 },
    size: "medium", manualKcal: null
  };
  const banner = { green:["🟢","綠燈・放心吃 👍"], yellow:["🟡","黃燈・適量 ⚠️"], red:["🔴","紅燈・少吃 🚫"] }[c];
  $("result").innerHTML =
    `<div class="light-banner light-${c}"><span style="font-size:22px">${banner[0]}</span> ${banner[1]}</div>
     <input class="name-input" id="rName" value="${current.name.replace(/"/g,'&quot;')}">
     <div class="portion-row" id="portionRow">
       ${Object.entries(PORTIONS).map(([k,v]) => `<button data-k="${k}" class="${k==='medium'?'on':''}">${v.label}</button>`).join("")}
     </div>
     <div class="kcal-edit"><input type="number" id="rKcal"><span class="kcal-unit">kcal</span></div>
     <div class="macros">
       <div class="macro"><b id="rP">0g</b><span>蛋白質</span></div>
       <div class="macro"><b id="rF">0g</b><span>脂肪</span></div>
       <div class="macro"><b id="rC">0g</b><span>碳水</span></div>
     </div>
     <p class="reason">💡 ${current.reason}</p>
     <button class="btn" id="addBtn" style="margin-top:12px">＋ 加入${isToday(viewDate)?"今日":dateLabel(viewDate)}記錄</button>`;

  $("rName").oninput = e => current.name = e.target.value;
  $("rKcal").oninput = e => { current.manualKcal = parseInt(e.target.value) || 0; };
  $("portionRow").querySelectorAll("button").forEach(b => b.onclick = () => {
    current.size = b.dataset.k; current.manualKcal = null;
    $("portionRow").querySelectorAll("button").forEach(x => x.classList.toggle("on", x===b));
    renderResultNumbers();
  });
  $("addBtn").onclick = addCurrent;
  renderResultNumbers();
}

function effKcal() {
  if (current.manualKcal !== null) return current.manualKcal;
  return Math.round(current.base.kcal * PORTIONS[current.size].f);
}
function renderResultNumbers() {
  const f = PORTIONS[current.size].f;
  $("rKcal").value = effKcal();
  $("rP").textContent = Math.round(current.base.protein * f) + "g";
  $("rF").textContent = Math.round(current.base.fat * f) + "g";
  $("rC").textContent = Math.round(current.base.carb * f) + "g";
}

function addCurrent() {
  const log = loadDay(viewDate);
  log.push({
    name: current.name,
    portion: PORTIONS[current.size].label,
    kcal: effKcal(), color: current.color, thumb: current.thumb
  });
  saveDay(viewDate, log);
  current = null;
  $("result").innerHTML = "";
  $("status").innerHTML = '<p class="muted">✅ 已加入記錄</p>';
  setTimeout(()=>$("status").innerHTML="", 1500);
  renderAll();
}

// ---- Service Worker（離線可用）----
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

// init
$("apiKey").value = "";
renderAll();
</script>
</body>
</html>
